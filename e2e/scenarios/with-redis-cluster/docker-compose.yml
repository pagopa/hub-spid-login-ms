services:
  hub-spid-login:
    build:
      context: ../../../
      dockerfile: Dockerfile
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    env_file:
      - env.scenario
    depends_on:
      redis-cluster:
        condition: service_healthy
      spid-saml-check:
        condition: service_healthy
    expose:
      - ${SERVER_PORT}
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
    restart: on-failure
    command: ["yarn", "start"]
    volumes:
      - "./res/certs:/usr/src/app/certs:ro"
      # - "../../../:/usr/src/app/"
    networks:
      - spid-net

  spid-saml-check:
    image: ghcr.io/pagopa/spid-saml-check:v.1.8.3-snapshot@sha256:6349005e929962ab612feedb228130bce42b1f3cffb7bb0434e716bfac243638
    restart: unless-stopped
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    ports:
      - ${SPID_DEMO_IDP_PORT}:${SPID_DEMO_IDP_PORT}
    volumes:
      - "./res/spidsamlcheck-conf:/spid-saml-check/spid-validator/config"
      - "./res/hsl-conf:/data/bootstrap"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:${SPID_DEMO_IDP_PORT}/demo', res => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s
    networks:
      - spid-net

  #
  #                   __ __            __             __
  #   .----.-----.--|  |__.-----.----|  .--.--.-----|  |_.-----.----.
  #  |   _|  -__|  _  |  |__ --|  __|  |  |  |__ --|   _|  -__|   _|
  # |__| |_____|_____|__|_____|____|__|_____|_____|____|_____|__|
  #
  #
  redis-node-0:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.100
    ports:
      - 6380:6380
    volumes:
      - ./docker/redis/6380/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-node-0-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  redis-node-1:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.101
    ports:
      - 6381:6381
    volumes:
      - ./docker/redis/6381/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-node-1-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  redis-node-2:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.102
    ports:
      - 6382:6382
    volumes:
      - ./docker/redis/6382/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-node-2-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  redis-node-3:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.103
    ports:
      - 6383:6383
    volumes:
      - ./docker/redis/6383/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-node-3-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  redis-node-4:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.104
    ports:
      - 6384:6384
    volumes:
      - ./docker/redis/6384/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-node-4-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  redis-node-5:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.105
    ports:
      - 6385:6385
    volumes:
      - ./docker/redis/6385/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-node-5-data:/data
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]

  redis-cluster:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    networks:
      spid-net:
        ipv4_address: 172.18.0.99
    ports:
      - 6379:6379
    volumes:
      - ./docker/redis/6379/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-cluster-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "bitnami", "-c", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    # The following depends_on is needed to ensure that all nodes are started
    # by simply starting the `redis-cluster` service.
    depends_on:
      - redis-node-0
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5

  cluster-builder:
    image: redis:7.0-alpine@sha256:c9d92d840fd011c908f040592857c724ae6d877f2aba5c40ad963276507386b2
    ports:
      - 6999:6999
    networks:
      - spid-net
    command: |-
      redis-cli
      -a bitnami
      -p 6379
      --cluster create
      redis-cluster:6379
      redis-node-0:6380
      redis-node-1:6381
      redis-node-2:6382
      redis-node-3:6383
      redis-node-4:6384
      redis-node-5:6385
      --cluster-replicas 1
      --cluster-yes
    depends_on:
      - redis-cluster
      - redis-node-0
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
    environment:
      - 'ALLOW_EMPTY_PASSWORD=yes'
      - 'REDIS_NODES=redis-cluster redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4'
      - 'REDIS_CLUSTER_CREATOR=yes'
  #
  #
  #
  #

networks:
  spid-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  redis-node-0-data:
  redis-node-1-data:
  redis-node-2-data:
  redis-node-3-data:
  redis-node-4-data:
  redis-node-5-data:
  redis-cluster-data:
